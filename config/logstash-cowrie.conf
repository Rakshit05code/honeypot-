input {
  beats {
    port => 5044
  }
}

filter {
  json {
    source => "message"
  }

  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "geoip"
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "cowrie-%{+YYYY.MM.dd}"
  }
}
